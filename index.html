<style>
:root{
  --bg:#0f1117; --bg2:#141824; --card:#181d29; --card2:#212837; --line:#262d3d;
  --tx:#e9ecf4; --mut:#8b93a8; --dim:#5c6478;
  --acc:#ff7a1a; --acc2:#ffb15c; --green:#2ed573; --red:#ff4d5e; --yellow:#ffc233; --blue:#4d9dfd; --purple:#a78bfa;
  --rad:16px; --nav-h:calc(62px + env(safe-area-inset-bottom));
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Inter,sans-serif;font-size:15px;overscroll-behavior-y:none}
body{padding-bottom:var(--nav-h)}
h1,h2,h3{margin:0;font-weight:700}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:15px;background:var(--bg2);color:var(--tx);border:1px solid var(--line);border-radius:10px;padding:10px 12px;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--acc)}
input[type=number]{-moz-appearance:textfield}
::placeholder{color:var(--dim)}
.hidden{display:none!important}

/* header */
#hdr{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:calc(10px + env(safe-area-inset-top)) 16px 10px;background:rgba(15,17,23,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
#hdr .logo{font-size:19px;font-weight:800;letter-spacing:.3px}
#hdr .logo span{color:var(--acc)}
#hdr .sub{font-size:11.5px;color:var(--mut);margin-top:1px}
.iconbtn{font-size:20px;padding:8px;border-radius:12px;background:var(--card);border:1px solid var(--line);line-height:1}
.iconbtn:active{transform:scale(.92)}

/* layout */
main{padding:14px 14px 30px;max-width:560px;margin:0 auto}
.view{display:none;animation:fadein .22s ease}
.view.on{display:block}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--rad);padding:16px;margin-bottom:14px}
.card h3{font-size:13px;text-transform:uppercase;letter-spacing:.8px;color:var(--mut);margin-bottom:12px;font-weight:600}
.row{display:flex;align-items:center;gap:10px}
.spread{display:flex;align-items:center;justify-content:space-between;gap:10px}
.grow{flex:1}
.mut{color:var(--mut)} .dim{color:var(--dim)} .sm{font-size:12.5px} .xs{font-size:11px} .b{font-weight:700}
.acc{color:var(--acc)} .green{color:var(--green)} .red{color:var(--red)} .yellow{color:var(--yellow)} .blue{color:var(--blue)}

/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;background:var(--acc);color:#fff;font-weight:700;font-size:14.5px;padding:12px 18px;border-radius:12px;transition:transform .1s,opacity .2s}
.btn:active{transform:scale(.96)}
.btn.sec{background:var(--card2);color:var(--tx);border:1px solid var(--line)}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--mut)}
.btn.sm2{padding:8px 13px;font-size:13px;border-radius:10px}
.btn.full{width:100%}
.btn:disabled{opacity:.5;pointer-events:none}
.chip{display:inline-flex;align-items:center;gap:4px;padding:7px 13px;border-radius:99px;background:var(--card2);border:1px solid var(--line);font-size:13px;color:var(--mut);white-space:nowrap;transition:all .15s}
.chip.on{background:rgba(255,122,26,.15);border-color:var(--acc);color:var(--acc);font-weight:600}
.chiprow{display:flex;gap:8px;overflow-x:auto;padding:2px 0 8px;scrollbar-width:none}
.chiprow::-webkit-scrollbar{display:none}

/* bottom nav */
#nav{position:fixed;bottom:0;left:0;right:0;z-index:60;display:flex;background:rgba(20,24,36,.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
#nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 0 7px;font-size:10.5px;color:var(--dim);font-weight:600}
#nav button .ic{font-size:21px;filter:grayscale(1);opacity:.6;transition:all .2s}
#nav button.on{color:var(--acc)}
#nav button.on .ic{filter:none;opacity:1;transform:translateY(-2px) scale(1.12)}

/* hero / character */
.hero{background:linear-gradient(140deg,#1c2130 0%,#181d29 60%);position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;top:-60px;right:-60px;width:180px;height:180px;background:radial-gradient(circle,rgba(255,122,26,.18),transparent 70%);pointer-events:none}
.avatar{font-size:52px;line-height:1;animation:bob 2.6s ease-in-out infinite;display:inline-block}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.lvlbar{height:8px;background:var(--bg2);border-radius:99px;overflow:hidden;margin-top:8px}
.lvlbar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--acc),var(--acc2));transition:width .6s cubic-bezier(.2,.8,.2,1)}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:99px;background:rgba(255,122,26,.14);color:var(--acc2)}
.badge.g{background:rgba(46,213,115,.13);color:var(--green)}
.badge.r{background:rgba(255,77,94,.13);color:var(--red)}
.badge.y{background:rgba(255,194,51,.12);color:var(--yellow)}
.badge.b{background:rgba(77,157,253,.13);color:var(--blue)}

/* rings & stats */
.ringwrap{position:relative;width:118px;height:118px;flex-shrink:0}
.ringwrap svg{transform:rotate(-90deg)}
.ringwrap .cent{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{background:var(--bg2);border:1px solid var(--line);border-radius:13px;padding:12px}
.stat .v{font-size:20px;font-weight:800;margin-top:2px}
.macro{margin-top:10px}
.macro .bar{height:7px;background:var(--bg2);border-radius:99px;overflow:hidden;margin-top:4px}
.macro .bar i{display:block;height:100%;border-radius:99px;transition:width .5s}

/* lists */
.item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
.item:last-child{border-bottom:none}
.item .ic2{width:42px;height:42px;border-radius:12px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.del{color:var(--dim);font-size:17px;padding:6px}
.del:active{color:var(--red)}

/* calendar */
.cal{user-select:none}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:8px}
.calgrid .dow{text-align:center;font-size:10.5px;color:var(--dim);font-weight:700;padding:4px 0}
.cald{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;font-size:13px;color:var(--mut);position:relative;gap:2px}
.cald.out{opacity:.25}
.cald.today{border:1.5px solid var(--acc);color:var(--tx);font-weight:700}
.cald.gym{background:rgba(255,122,26,.16);color:var(--acc2);font-weight:700}
.cald .dots{display:flex;gap:2.5px;height:5px}
.cald .dots i{width:5px;height:5px;border-radius:50%}

/* muscle heat */
.mrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
.mrow:last-child{border:none}
.mdot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.mbar{height:6px;border-radius:99px;background:var(--bg2);flex:1;overflow:hidden;max-width:120px}
.mbar i{display:block;height:100%;border-radius:99px}

/* sets editor */
.setrow{display:grid;grid-template-columns:34px 1fr 1fr 38px;gap:8px;align-items:center;margin-bottom:8px}
.setrow .sn{color:var(--dim);font-weight:700;font-size:13px;text-align:center}
.setrow input{text-align:center;padding:10px 6px}

/* sheets & modals */
.sheetwrap{position:fixed;inset:0;z-index:100;display:flex;align-items:flex-end;justify-content:center}
.sheetwrap .bg{position:absolute;inset:0;background:rgba(5,7,12,.66);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);animation:fadein .2s}
.sheet{position:relative;width:100%;max-width:560px;max-height:88vh;background:var(--bg2);border-radius:22px 22px 0 0;border:1px solid var(--line);border-bottom:none;display:flex;flex-direction:column;animation:up .28s cubic-bezier(.2,.9,.3,1)}
@keyframes up{from{transform:translateY(60%)}to{transform:none}}
.sheet .grab{width:42px;height:5px;border-radius:99px;background:var(--line);margin:10px auto 4px;flex-shrink:0}
.sheet .shead{padding:8px 18px 12px;border-bottom:1px solid var(--line);flex-shrink:0}
.sheet .sbody{overflow-y:auto;padding:14px 18px calc(20px + env(safe-area-inset-bottom));-webkit-overflow-scrolling:touch}
.exoption{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:11px 4px;border-bottom:1px solid var(--line);font-size:14.5px}
.exoption:active{background:var(--card)}
.exoption .m{font-size:11.5px;color:var(--dim)}

/* learn grid */
.lgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.lcard{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;text-align:left;padding:0}
.lcard .im{width:100%;aspect-ratio:4/3;background:#fff;position:relative;overflow:hidden}
.lcard .im img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.lcard .im img.f2{animation:flip 1.7s steps(1) infinite}
@keyframes flip{0%,49%{opacity:0}50%,100%{opacity:1}}
.lcard .nm{padding:9px 11px 11px;font-size:13px;font-weight:600;line-height:1.3}
.bigim{width:100%;aspect-ratio:4/3;background:#fff;border-radius:14px;position:relative;overflow:hidden;margin-bottom:12px}
.bigim img{width:100%;height:100%;object-fit:contain;position:absolute;inset:0}
.bigim img.f2{animation:flip 1.7s steps(1) infinite}

/* coach */
.coachbox{background:linear-gradient(135deg,rgba(167,139,250,.08),rgba(77,157,253,.06));border:1px solid rgba(167,139,250,.25)}
.bubble{background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:12px 14px;font-size:14px;line-height:1.55;margin-top:10px;white-space:pre-wrap}
.spin{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-3px}
@keyframes sp{to{transform:rotate(360deg)}}

/* toast */
#toast{position:fixed;left:50%;bottom:calc(var(--nav-h) + 14px);transform:translateX(-50%) translateY(20px);background:#242b3c;border:1px solid var(--line);color:var(--tx);padding:11px 18px;border-radius:12px;font-size:13.5px;font-weight:600;z-index:200;opacity:0;pointer-events:none;transition:all .25s;max-width:88vw;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.5)}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* rest timer */
#resttimer{position:fixed;right:14px;bottom:calc(var(--nav-h) + 14px);z-index:90;background:var(--acc);color:#fff;font-weight:800;font-size:15px;padding:12px 16px;border-radius:99px;box-shadow:0 6px 24px rgba(255,122,26,.4);display:none;align-items:center;gap:8px}
#resttimer.on{display:flex}

/* onboarding steps */
.obstep{display:none}
.obstep.on{display:block;animation:fadein .25s}
.field{margin-bottom:13px}
.field label{display:block;font-size:12.5px;color:var(--mut);font-weight:600;margin-bottom:6px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.segs{display:grid;gap:8px}
.seg{border:1px solid var(--line);background:var(--bg2);border-radius:12px;padding:12px 14px;text-align:left;font-size:14px}
.seg.on{border-color:var(--acc);background:rgba(255,122,26,.1)}
.seg .d{font-size:12px;color:var(--mut);margin-top:2px}

/* misc */
.datebar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.datebar .db{font-size:18px;padding:6px 14px;color:var(--mut)}
canvas.spark{width:100%;height:56px;display:block}
.empty{text-align:center;color:var(--dim);padding:22px 10px;font-size:13.5px;line-height:1.6}
.empty .e{font-size:34px;display:block;margin-bottom:6px}
details.adv summary{color:var(--mut);font-size:13px;cursor:pointer;padding:4px 0}
.tag{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:6px;background:var(--card2);color:var(--mut);text-transform:capitalize}
</style>
</head>
<body>
<div id="hdr">
  <div>
    <div class="logo">Fit<span>Forge</span></div>
    <div class="sub" id="hdrsub"></div>
  </div>
  <div class="row">
    <button class="iconbtn" id="btncoach" title="AI Coach">🤖</button>
    <button class="iconbtn" id="btnsettings" title="Settings">⚙️</button>
  </div>
</div>

<main>
  <div class="view" id="view-home"></div>
  <div class="view" id="view-train"></div>
  <div class="view" id="view-habits"></div>

<nav id="nav">

</nav>

<div id="resttimer"><span id="rt_t">60</span>s rest <button id="rt_x" style="color:#fff;font-size:16px">✕</button></div>
<div id="toast"></div>
<div id="modals"></div>

<script>
'use strict';
/* ============ FitForge — single-file gym tracking & motivation app ============ */

/* ---------- tiny utils ---------- */
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const pad=n=>String(n).padStart(2,'0');
const ymd=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const todayKey=()=>ymd(new Date());
const parseYmd=k=>{const[a,b,c]=k.split('-').map(Number);return new Date(a,b-1,c)};
const addDays=(k,n)=>{const d=parseYmd(k);d.setDate(d.getDate()+n);return ymd(d)};
const daysBetween=(k1,k2)=>Math.round((parseYmd(k2)-parseYmd(k1))/864e5);
const weekStart=k=>{const d=parseYmd(k);const dow=(d.getDay()+6)%7;d.setDate(d.getDate()-dow);return ymd(d)};
const fmtDay=k=>{const d=parseYmd(k),t=todayKey();if(k===t)return 'Today';if(k===addDays(t,-1))return 'Yesterday';if(k===addDays(t,1))return 'Tomorrow';return d.toLocaleDateString(undefined,{weekday:'short',day:'numeric',month:'short'})};
const rnd=(n,p=0)=>{const m=10**p;return Math.round(n*m)/m};
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const uid=()=>Math.random().toString(36).slice(2,9);
let _toastT;function toast(msg,ms=2200){const t=$('#toast');t.textContent=msg;t.classList.add('on');clearTimeout(_toastT);_toastT=setTimeout(()=>t.classList.remove('on'),ms)}
function haptic(){try{navigator.vibrate&&navigator.vibrate(12)}catch(e){}}

/* ---------- constants ---------- */
const AI_DEFAULT={key:'sk-bf-6277a6c8-732a-438b-b7c4-530f2d07e911',endpoint:'https://gateway-buildathon.ltl.sh/v1/chat/completions',model:'gpt-4o',fallbackModel:'gpt-5.5'};

/* ---------- admin analytics (PostHog) ---------- */
const PH_KEY='phc_vqVwSqbQKEEy9drNzw39LdpuNRqZbUxZccHSFPDoudCE'; // PostHog project API key
const PH_HOST='https://us.i.posthog.com';
let PH=null;
function track(ev,props){try{PH&&PH.capture(ev,props||{})}catch(e){}}
function phIdentify(){
  try{
    if(!PH)return;
    if(!S.uidv){S.uidv='u_'+uid()+uid();save()}
    PH.identify(S.uidv,{name:S.profile.name||'(no name)',goal:S.profile.goal,streak_goal:S.profile.streakGoal,level:streakInfo().level,habits:activeHabits().length,onboarded:!!S.onboarded});
  }catch(e){}
}
function initAnalytics(){
  if(!/^phc_/.test(PH_KEY))return;
  try{
    const sc=document.createElement('script');
    sc.src=PH_HOST+'/static/array.js';sc.async=true;
    sc.onload=()=>{try{
      window.posthog.init(PH_KEY,{api_host:PH_HOST,autocapture:true,capture_pageview:true,
        session_recording:{maskAllInputs:false,maskInputOptions:{password:true}},
        loaded:()=>{PH=window.posthog;phIdentify();track('app_opened',{level:streakInfo().level,habits:activeHabits().length})}});
    }catch(e){}};
    document.head.appendChild(sc);
  }catch(e){}
}
window.addEventListener('error',e=>track('js_error',{msg:String(e&&e.message).slice(0,200),line:e&&e.lineno}));

const LEVELS=[
 [0,'🥚','Egg','Everyone starts somewhere'],
 [1,'🐣','Hatchling','You showed up!'],
 [2,'🐥','Chick','Two weeks strong'],
 [3,'🐤','Rookie','Habit is forming'],
 [4,'🐦','Flyer','A month of grind'],
 [6,'🦊','Hunter','Discipline unlocked'],
 [8,'🐺','Wolf','Two months deep'],
 [10,'🐻','Bear','Strength is showing'],
 [13,'🦍','Beast','A quarter of consistency'],
 [16,'🦁','Alpha','Gym is your home now'],
 [20,'🐉','Dragon','Half a year of fire'],
 [26,'⚡','Titan','Unstoppable force'],
 [40,'🏆','Legend','Immortal streak']
];
const levelFor=n=>{let L=LEVELS[0];for(const l of LEVELS)if(n>=l[0])L=l;return L};

/* ---------- cloud backup & sync (kept alongside on-device storage) ---------- */
/* Dual free JSON-store providers; auto-fallback. Sync code = provider:id.key */
const SYNC_PROVIDERS={
  ec:{
    create:async(key,body)=>{const r=await fetch('https://json.extendsclass.com/bin',{method:'POST',headers:{'Content-Type':'application/json','Security-key':key},body});if(!r.ok)throw new Error('HTTP '+r.status);const j=await r.json();if(!j.id)throw new Error('no id');return String(j.id)},
    get:id=>fetch('https://json.extendsclass.com/bin/'+id),
    put:(id,key,body)=>fetch('https://json.extendsclass.com/bin/'+id,{method:'PUT',headers:{'Content-Type':'application/json','Security-key':key},body})
  },
  jb:{
    create:async(key,body)=>{const r=await fetch('https://jsonblob.com/api/jsonBlob',{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body});if(!r.ok)throw new Error('HTTP '+r.status);const loc=r.headers.get('Location')||r.headers.get('X-jsonblob')||'';const id=loc.split('/').filter(Boolean).pop();if(!id)throw new Error('no id');return id},
    get:id=>fetch('https://jsonblob.com/api/jsonBlob/'+id,{headers:{'Accept':'application/json'}}),
    put:(id,key,body)=>fetch('https://jsonblob.com/api/jsonBlob/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body})
  }
};
let _pushT=null,_syncBusy=false;
function scheduleSyncPush(){if(!S.sync||!S.sync.id)return;clearTimeout(_pushT);_pushT=setTimeout(syncPush,2500)}
async function syncPush(){
  if(!S.sync||!S.sync.id||_syncBusy)return false;_syncBusy=true;
  try{
    const P=SYNC_PROVIDERS[S.sync.p]||SYNC_PROVIDERS.ec;
    const r=await P.put(S.sync.id,S.sync.key,JSON.stringify(S));
    if(!r.ok)throw new Error('HTTP '+r.status);
    S.sync.last=Date.now();try{localStorage.setItem(SKEY,JSON.stringify(S))}catch(e){}
    return true;
  }catch(e){return false}
  finally{_syncBusy=false}
}
async function syncCreate(){
  const key=uid()+uid()+uid();const body=JSON.stringify(S);
  let lastErr;
  for(const p of ['ec','jb']){
    try{const id=await SYNC_PROVIDERS[p].create(key,body);S.sync={p,id,key,last:Date.now()};save();track('sync_enabled',{provider:p});return syncCode()}
    catch(e){lastErr=e}
  }
  throw lastErr||new Error('backup services unreachable');
}
const syncCode=()=>S.sync?`${S.sync.p||'ec'}:${S.sync.id}.${S.sync.key}`:null;
function parseSyncCode(code){
  code=code.trim();
  let p='ec';
  if(code.includes(':')){const parts=code.split(':');p=parts[0];code=parts.slice(1).join(':')}
  const dot=code.indexOf('.');
  return{p:SYNC_PROVIDERS[p]?p:'ec',id:dot>0?code.slice(0,dot):code,key:dot>0?code.slice(dot+1):''};
}
async function syncPull(code){
  const c=code?parseSyncCode(code):(S.sync||{});
  if(!c.id)throw new Error('no sync code');
  const r=await(SYNC_PROVIDERS[c.p||'ec']).get(c.id);
  if(!r.ok)throw new Error('HTTP '+r.status);
  const j=await r.json();
  if(!j.profile||!j.days)throw new Error('not a FitForge backup');
  return j;
}
function adoptRemote(j,code){
  S=Object.assign(defaultState(),j);
  if(code){const c=parseSyncCode(code);S.sync={p:c.p,id:c.id,key:c.key,last:Date.now()}}
  try{localStorage.setItem(SKEY,JSON.stringify(S))}catch(e){}
}
async function bootSyncPull(){
  if(!S.sync||!S.sync.id)return;
  try{
    const remote=await syncPull();
    if((remote.updatedAt||0)>(S.updatedAt||0)+3000){adoptRemote(remote);render();toast('☁️ Restored latest data from cloud')}
    else scheduleSyncPush();
  }catch(e){}
}

  let last=null;

function attrScores(){ /* RPG stats: 28-day weighted completion per life area */
  const t=todayKey(),buckets={};

    else{for(let i=0;i<days;i++)if(habitDone(h,addDays(t,-i)))done++;poss=Math.max(1,days*Math.min(h.freq,7)/7)}
    (buckets[h.cat]||buckets.mind).push([clamp(done/poss,0,1)*100,h.weight||2]);

/* ---------- streak engine ---------- */
function isActiveDay(k){const d=dayIf(k);return !!(d&&(d.ex.length||d.acts.length))}
function weekDays(wk){let n=0;for(let i=0;i<7;i++)if(isActiveDay(addDays(wk,i)))n++;return n}
function weekQualifies(wk){ /* level-up week = gym goal hit AND ≥70% of weighted habit targets */
  const gymOk=weekDays(wk)>=S.profile.streakGoal;
  const hs=activeHabits().filter(h=>weekStart(h.created)<wk); // habits count from the week AFTER they're added
  if(!hs.length)return{ok:gymOk,gymOk,habitPct:1};
  let got=0,tot=0;
  for(const h of hs){const w=h.weight||2;tot+=w;if(habitWeekStat(h,wk).ok)got+=w}
  const habitPct=tot?got/tot:1;
  return{ok:gymOk&&habitPct>=0.7,gymOk,habitPct};
}
function streakInfo(){
  const goal=S.profile.streakGoal, thisWk=weekStart(todayKey());
  const a=Object.keys(S.days).filter(isActiveDay).sort()[0], b=Object.keys(S.hlog).sort()[0];
  const start=[a,b].filter(Boolean).sort()[0];
  if(!start)return{level:0,shields:0,thisWeek:0,goal,qualifiedWeeks:0,totalWeeks:0,history:[],curHabitPct:1};
  let wk=weekStart(start), level=0, shields=0, qual=0, total=0, sinceShield=0, history=[];
  while(wk<thisWk){
    const q=weekQualifies(wk), n=weekDays(wk); total++;
    if(q.ok){level++;qual++;sinceShield++;if(sinceShield>=2){shields=Math.min(2,shields+1);sinceShield=0}}
    else if(shields>0){shields--}
    else{level=Math.max(0,level-1)}
    history.push({wk,n,ok:q.ok,habitPct:q.habitPct});
    wk=addDays(wk,7);
  }
  return{level,shields,thisWeek:weekDays(thisWk),goal,qualifiedWeeks:qual,totalWeeks:total,history,curHabitPct:weekPacePct(thisWk)};
}
function weekPacePct(wk){ /* in-progress week: is each habit ON PACE for its weekly target? (1-day grace) */
  const di=daysBetween(wk,todayKey())+1;
  const hs=activeHabits().filter(h=>weekStart(h.created)<wk);
  if(!hs.length)return 1;
  let got=0,tot=0;
  for(const h of hs){const w=h.weight||2;tot+=w;
    const st=habitWeekStat(h,wk);
    if(h.type==='quit'){if(st.ok)got+=w}
    else{const need=Math.max(0,Math.ceil(Math.min(h.freq,7)*di/7)-1);if(st.done>=need)got+=w}}
  return tot?got/tot:1;
}

    for(const ex of d.ex){
      const sets=ex.sets.length;
      const hit=(m,w)=>{if(!stats[m])stats[m]={last:null,daysAgo:Infinity,setsWeek:0,sets2Week:0};
        if(!stats[m].last||k>stats[m].last)stats[m].last=k;
        if(k>=wkStart)stats[m].setsWeek+=sets*w;
        if(daysBetween(k,t)<14)stats[m].sets2Week+=sets*w};
      (ex.muscles||[]).forEach(m=>hit(m,1));(ex.sec||[]).forEach(m=>hit(m,0.5));
    }
  }
  const started=Object.keys(S.days).some(isActiveDay);
  for(const m of Object.keys(stats)){
    const s=stats[m];
    s.daysAgo=s.last?daysBetween(s.last,t):(started?999:Infinity);
    s.status = !started?'none' : s.daysAgo>=14?'crit' : s.daysAgo>7?'bad' : s.setsWeek>=6?'good' : s.setsWeek>=3?'ok':'low';
  }
  return stats;
}
const STATUS_META={good:['var(--green)','On track'],ok:['#9fd66b','Decent'],low:['var(--yellow)','Low volume'],bad:['var(--red)','Neglected 7d+'],crit:['#b71c2e','Neglected 14d+'],none:['var(--dim)','No data']};

function trainSuggestion(){
  const st=muscleStats();
  const started=Object.values(st).some(s=>s.last);
  if(!started)return{title:'Start with a full-body session 💥',detail:'Log your first workout — squats, bench press, rows and a plank are a great opening day.',muscles:[]};
  const score=m=>{const s=st[m];return (s.daysAgo===999?30:Math.min(s.daysAgo,30))*2 - Math.min(s.setsWeek,12)};
  let best=null,bestScore=-1e9;
  for(const[g,ms]of Object.entries(MGROUPS)){const sc=ms.reduce((a,m)=>a+score(m),0)/ms.length;if(sc>bestScore){bestScore=sc;best=g}}
  const worst=[...MUSCLES].sort((a,b)=>score(b)-score(a)).slice(0,3);
  const names=worst.map(m=>`${m} (${st[m].daysAgo===999?'never trained':st[m].daysAgo+'d ago'})`).join(', ');
  return{title:`Next up: ${best} day ${best==='Legs'?'🦵':best==='Push'?'🔥':best==='Pull'?'🪝':'🍫'}`,detail:`Most under-trained right now: ${names}.`,muscles:worst,group:best};
}

/* ---------- strength / progress ---------- */
const e1rm=(w,r)=>r>0?w*(1+r/30):0;
function exerciseHistory(){
  const h={};
  for(const k of Object.keys(S.days).sort()){
    for(const ex of S.days[k].ex){
      const best=Math.max(0,...ex.sets.map(s=>e1rm(s.w||0,s.r||0)));
      const vol=ex.sets.reduce((a,s)=>a+(s.w||0)*(s.r||0),0);
      if(!h[ex.name])h[ex.name]=[];
      h[ex.name].push({k,best,vol,sets:ex.sets.length});
    }
  }
  return h;
}
function progressReport(){
  const h=exerciseHistory(), t=todayKey();
  const per=[];
  for(const[name,ss]of Object.entries(h)){
    const recent=ss.filter(x=>daysBetween(x.k,t)<=60&&x.best>0);
    if(recent.length>=2){
      const first=recent[0].best,last=recent[recent.length-1].best;
      if(first>0)per.push({name,pct:(last/first-1)*100,first,last,n:recent.length,spark:recent.map(x=>x.best)});
    }
  }
  per.sort((a,b)=>b.pct-a.pct);
  const strength=per.length?clamp(per.reduce((a,x)=>a+x.pct,0)/per.length,-60,60):0;
  const si=streakInfo();
  const last4=si.history.slice(-4);
  const consistency=last4.length?Math.round(100*last4.filter(w=>w.ok).length/last4.length):(si.thisWeek>=si.goal?100:Math.round(100*si.thisWeek/si.goal));
  const st=muscleStats();
  const neglected=MUSCLES.filter(m=>st[m].status==='bad'||st[m].status==='crit').length;
  const balance=Object.values(st).some(s=>s.last)?Math.max(0,100-neglected*9):0;
  const overall=rnd(0.6*strength+0.2*(consistency-50)/2.5+0.2*(balance-50)/2.5,1);
  return{per,strength:rnd(strength,1),consistency,balance,overall,neglected};
}
function weeklyVolume(nWeeks=8){
  const t=todayKey(),cur=weekStart(t),out=[];
  for(let i=nWeeks-1;i>=0;i--){
    const wk=addDays(cur,-7*i);let vol=0,sets=0;
    for(let j=0;j<7;j++){const d=dayIf(addDays(wk,j));if(d)for(const ex of d.ex){vol+=ex.sets.reduce((a,s)=>a+(s.w||0)*(s.r||0),0);sets+=ex.sets.length}}
    out.push({wk,vol,sets});
  }
  return out;
}

/* ---------- nutrition math ---------- */
function targets(){
  const p=S.profile;
  const bmr=10*p.weightKg+6.25*p.heightCm-5*p.age+(p.sex==='m'?5:-161);
  const tdee=bmr*p.activity;
  const adj={cut:-450,aesthetic:-250,maintain:0,bulk:+350}[p.goal]??0;
  const kcal=Math.round(tdee+adj);
  const protein=Math.round(p.weightKg*({cut:2,aesthetic:2,bulk:1.8,maintain:1.6}[p.goal]??1.8));
  const fat=Math.round(p.weightKg*0.9);
  const carbs=Math.max(0,Math.round((kcal-protein*4-fat*9)/4));
  return{kcal,protein,fat,carbs,fiber:p.sex==='m'?34:28,tdee:Math.round(tdee),bmr:Math.round(bmr)};
}
function dayTotals(k){
  const d=dayIf(k)||{ex:[],acts:[],meals:[]};
  const eaten=d.meals.reduce((a,m)=>({k:a.k+(m.kcal||0),p:a.p+(m.p||0),c:a.c+(m.c||0),f:a.f+(m.f||0),fb:a.fb+(m.fb||0)}),{k:0,p:0,c:0,f:0,fb:0});
  const actBurn=d.acts.reduce((a,x)=>a+(x.kcal||0),0);
  const gymSets=d.ex.reduce((a,e)=>a+e.sets.length,0);
  const gymBurn=Math.round(5*3.5*S.profile.weightKg/200*(gymSets*3.5));
  return{...eaten,burn:actBurn+gymBurn,gymSets,gymBurn,actBurn};
}

/* ---------- local meal parser (fallback when AI unreachable) ---------- */
function localParseMeal(text){
  const parts=text.toLowerCase().split(/[,\n]|\band\b|\bwith\b|\+/).map(s=>s.trim()).filter(Boolean);
  const items=[];
  for(const p of parts){
    const qm=p.match(/(\d+(?:\.\d+)?)/);const qty=qm?parseFloat(qm[1]):1;
    const words=p.replace(/[\d.]+/g,' ').split(/\s+/).filter(w=>w.length>2);
    let best=null,bestScore=0;
    for(const f of FOOD_DB){
      const fn=f[0].toLowerCase();let sc=0;
      for(const w of words)if(fn.includes(w))sc+=w.length;
      if(sc>bestScore){bestScore=sc;best=f}
    }
    const q=clamp(qty,0.25,20);
    if(best&&bestScore>=3)items.push({name:`${best[0]} ×${q}`,kcal:Math.round(best[1]*q),p:rnd(best[2]*q,1),c:rnd(best[3]*q,1),f:rnd(best[4]*q,1),fb:rnd(best[5]*q,1),guess:false});
    else if(p.length>2)items.push({name:p+' (rough estimate)',kcal:Math.round(180*q),p:rnd(5*q,1),c:rnd(22*q,1),f:rnd(7*q,1),fb:rnd(2*q,1),guess:true});
  }
  return items;
}

/* ---------- AI layer (bifrost gateway, with model + local fallbacks) ---------- */
/* AI provider chain: user's gateway (gpt-4o → gpt-5.5) → free keyless LLM (pollinations.ai) → local heuristics */
const FREE_AI={endpoint:'https://text.pollinations.ai/openai',model:'openai'};
async function aiCall(messages,{json=false,maxTokens=900,temp=0.4}={}){
  const attempts=[
    {url:S.ai.endpoint,model:S.ai.model,key:S.ai.key,name:'gateway/'+S.ai.model},
    {url:S.ai.endpoint,model:S.ai.model===AI_DEFAULT.model?AI_DEFAULT.fallbackModel:AI_DEFAULT.model,key:S.ai.key,name:'gateway/fallback'},
    {url:FREE_AI.endpoint,model:FREE_AI.model,key:null,name:'free/pollinations'}
  ];
  let lastErr;
  for(const a of attempts){
    try{
      const ctrl=new AbortController();const to=setTimeout(()=>ctrl.abort(),45000);
      const headers={'Content-Type':'application/json'};if(a.key)headers['Authorization']='Bearer '+a.key;
      const r=await fetch(a.url,{method:'POST',signal:ctrl.signal,headers,
        body:JSON.stringify({model:a.model,messages,max_tokens:maxTokens,temperature:temp})});
      clearTimeout(to);
      if(!r.ok)throw new Error('HTTP '+r.status);
      const j=await r.json();
      let txt=j.choices?.[0]?.message?.content;
      if(!txt)throw new Error('empty response');
      if(json){txt=txt.replace(/```json|```/g,'').trim();const s=txt.indexOf('{'),e2=txt.lastIndexOf('}');if(s>=0)txt=txt.slice(s,e2+1);return JSON.parse(txt)}
      return txt.trim();
    }catch(e){lastErr=e;track('ai_provider_failed',{provider:a.name,err:String(e.message).slice(0,100)})}
  }
  throw lastErr||new Error('AI unavailable');
}
function profileCtx(){

async function aiParseMeal(text){
  const j=await aiCall([
    {role:'system',content:`You are a precise nutritionist familiar with Indian food portions (katori, roti, plate). ${profileCtx()} Given a meal description, estimate nutrition per item. Reply ONLY strict JSON: {"items":[{"name":str,"kcal":int,"p":num,"c":num,"f":num,"fb":num}],"note":str}. p=protein g, c=carbs g, f=fat g, fb=fiber g. note = one short helpful remark (max 20 words). No markdown.`},

      <div class="ic2">${MUSCLE_ICON[ex.muscles?.[0]]||'💪'}</div>
      <div class="grow" ${editable?`onclick="editEx('${k}',${i})" style="cursor:pointer"`:''}>
        <div class="b">${esc(ex.name)}</div>
        <div class="xs mut">${ex.sets.map(s=>`${kgDisp(s.w)}${s.w?U():''}×${s.r}`).join('  ·  ')}</div>
        ${best>0?`<div class="xs dim">est. 1RM ${kgDisp(rnd(best,1))} ${U()}</div>`:''}
      </div>
      ${editable?`<button class="del" onclick="delEx('${k}',${i})">✕</button>`:''}
    </div>`;
  });
  d.acts.forEach((a,i)=>{
    h+=`<div class="item"><div class="ic2">${a.icon||'🏸'}</div>
      <div class="grow"><div class="b">${esc(a.name)}</div><div class="xs mut">${a.mins} min · ~${a.kcal} kcal</div></div>
      ${editable?`<button class="del" onclick="delAct('${k}',${i})">✕</button>`:''}</div>`;
  });
  return h;
}

function exOption(e){
  return`<button class="exoption" onclick="pickExercise('${e.id}')"><div class="ic2">${MUSCLE_ICON[e.primaryMuscles[0]]||'💪'}</div>

function lastSession(exId){
  const keys=Object.keys(S.days).sort().reverse();

function openSetEditor(id,editRef){
  const e=exById(id);if(!e)return;
  const prev=lastSession(id);
  let sets=editRef?day(editRef.k).ex[editRef.i].sets.map(s=>({...s})):(prev?prev.sets.map(s=>({...s})):[{w:0,r:8}]);
  const w=openSheet(`<div class="shead"><div class="spread"><h2 style="font-size:17px">${esc(e.name)}</h2>
     ${e.images.length?`<button class="chip" onclick="openExDetail('${e.id}')">📖 form</button>`:''}</div>
    <div class="xs mut" style="margin-top:3px">${e.primaryMuscles.join(', ')}${prev?` · last (${fmtDay(prev.k)}): ${prev.sets.map(s=>`${kgDisp(s.w)}×${s.r}`).join(', ')}`:''}</div>
   </div>
   <div class="sbody">
    <div class="setrow xs dim b"><span class="sn">SET</span><span style="text-align:center">WEIGHT (${U()})</span><span style="text-align:center">REPS</span><span></span></div>
    <div id="setrows"></div>
    <button class="btn ghost full sm2" id="addset">＋ Add set</button>
    <button class="btn full" style="margin-top:12px" id="setsave">${editRef?'Update':'Save'} exercise ✓</button>
   </div>`);
  const draw=()=>{
    w.querySelector('#setrows').innerHTML=sets.map((s,i)=>`<div class="setrow">
      <span class="sn">${i+1}</span>
      <input type="number" step="0.5" inputmode="decimal" value="${kgDisp(s.w)||''}" placeholder="0" data-i="${i}" data-f="w">
      <input type="number" inputmode="numeric" value="${s.r||''}" placeholder="8" data-i="${i}" data-f="r">
      <button class="del" data-del="${i}">✕</button></div>`).join('');
    w.querySelectorAll('#setrows input').forEach(inp=>inp.onchange=()=>{
      const i=+inp.dataset.i,f=inp.dataset.f,v=parseFloat(inp.value)||0;
      sets[i][f]=f==='w'?rnd(kgFromDisp(v),2):Math.round(v);
    });
    w.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{sets.splice(+b.dataset.del,1);if(!sets.length)sets=[{w:0,r:8}];draw()});
  };
  draw();
  w.querySelector('#addset').onclick=()=>{sets.push({...sets[sets.length-1]});draw()};
  w.querySelector('#setsave').onclick=()=>{
    const clean=sets.filter(s=>s.r>0);
    if(!clean.length)return toast('Add at least one set with reps');
    const entry={id:e.id,name:e.name,muscles:e.primaryMuscles,sec:e.secondaryMuscles,sets:clean,ts:Date.now()};
    if(editRef)day(editRef.k).ex[editRef.i]=entry;else day(trainDate).ex.push(entry);
    track('workout_logged',{exercise:e.name,sets:clean.length,edit:!!editRef});
    save();closeSheets();render();haptic();
    toast(editRef?'Updated ✓':'Logged ✓ Keep forging 🔥');
  };
}

let restIv=null;

function spark(canvas,data,color){
  if(!canvas||data.length<2)return;
  const dpr=window.devicePixelRatio||1,W=canvas.clientWidth*dpr,H=canvas.clientHeight*dpr;
  canvas.width=W;canvas.height=H;const ctx=canvas.getContext('2d');
  const min=Math.min(...data),max=Math.max(...data),rng=max-min||1;
  ctx.strokeStyle=color;ctx.lineWidth=2*dpr;ctx.lineJoin='round';ctx.beginPath();
  data.forEach((v,i)=>{const x=i/(data.length-1)*(W-8*dpr)+4*dpr,y=H-6*dpr-((v-min)/rng)*(H-12*dpr);i?ctx.lineTo(x,y):ctx.moveTo(x,y)});
  ctx.stroke();
  const lx=W-4*dpr,ly=H-6*dpr-((data[data.length-1]-min)/rng)*(H-12*dpr);
  ctx.fillStyle=color;ctx.beginPath();ctx.arc(lx-2*dpr,ly,3*dpr,0,7);ctx.fill();
}

    <div class="xs dim" style="margin-bottom:14px">Reminds you to log training & habits. Browser notifications fire while the app is open; in-app nudge banners always work.</div>
    <div class="xs dim" style="margin-bottom:14px">Your targets: ${tg.kcal} kcal · ${tg.protein}g protein · TDEE ${tg.tdee}</div>
    <details class="adv" open><summary>☁️ Cloud backup & sync</summary>
      <div id="syncbox" style="margin-top:10px">
      ${S.sync&&S.sync.id?`
        <div class="sm b green">✅ Cloud backup is ON</div>
        <div class="xs mut" style="margin:6px 0">Every change auto-syncs. Last: ${S.sync.last?new Date(S.sync.last).toLocaleString():'—'}</div>
        <div class="field"><label>Your sync code (keep it private — it's your data key)</label>
          <input readonly class="ph-no-capture" value="${esc(syncCode())}" onclick="this.select()" style="font-size:12px"></div>
        <div class="row">
          <button class="btn sec sm2" id="sy_copy">📋 Copy code</button>
          <button class="btn sec sm2" id="sy_now">Sync now</button>
          <button class="btn ghost sm2" id="sy_off" style="color:var(--red)">Disable</button>
        </div>`
      :`
        <div class="xs mut" style="margin-bottom:10px;line-height:1.5">Your data always lives on this device. Enable cloud backup to also auto-save every change online — you get a private sync code to restore on any phone/browser, so nothing is ever forgotten.</div>
        <button class="btn sm2" id="sy_on">☁️ Enable cloud backup</button>`}
        <div class="field" style="margin-top:12px"><label>Restore from a sync code</label>
          <div class="row"><input id="sy_code" class="ph-no-capture" placeholder="paste sync code…"><button class="btn sec sm2" id="sy_restore">Restore</button></div></div>
        <div id="sy_msg" class="xs mut" style="margin-top:6px"></div>
      </div>
    </details>
    <details class="adv"><summary>🤖 AI settings (bifrost gateway)</summary>
      <div class="field" style="margin-top:10px"><label>API key</label><input id="st_key" class="ph-no-capture" value="${esc(S.ai.key)}"></div>
      <div class="field"><label>Endpoint</label><input id="st_ep" value="${esc(S.ai.endpoint)}"></div>
      <div class="field"><label>Model</label><select id="st_model"><option ${S.ai.model==='gpt-4o'?'selected':''}>gpt-4o</option><option ${S.ai.model==='gpt-5.5'?'selected':''}>gpt-5.5</option></select></div>
      <button class="btn sec sm2" id="st_test">Test connection</button><span id="st_testout" class="sm mut" style="margin-left:8px"></span>
    </details>
    <div class="row" style="margin-top:16px">
      <button class="btn sec sm2 grow" onclick="exportData()">⬇️ Export data</button>
      <button class="btn sec sm2 grow" onclick="importData()">⬆️ Import</button>
      <button class="btn ghost sm2" onclick="resetAll()" style="color:var(--red)">Reset</button>
    </div>
    <button class="btn full" style="margin-top:14px" id="st_save">Save ✓</button>
   </div>`);
  const syMsg=(t,ok)=>{const m=w.querySelector('#sy_msg');m.textContent=t;m.style.color=ok?'var(--green)':'var(--red)'};
  const syOn=w.querySelector('#sy_on');if(syOn)syOn.onclick=async()=>{
    syOn.disabled=true;syOn.innerHTML='<span class="spin"></span> Setting up…';
    try{await syncCreate();closeSheets();openSettings();toast('☁️ Cloud backup enabled — copy your sync code!')}
    catch(e){syOn.disabled=false;syOn.textContent='☁️ Enable cloud backup';syMsg('Could not reach backup service ('+e.message+'). Your data is still safe on this device — try again later or use Export.',false)}
  };
  const syCopy=w.querySelector('#sy_copy');if(syCopy)syCopy.onclick=()=>{navigator.clipboard&&navigator.clipboard.writeText(syncCode());toast('Sync code copied — save it somewhere safe')};
  const syNow=w.querySelector('#sy_now');if(syNow)syNow.onclick=async()=>{syNow.innerHTML='<span class="spin"></span>';const ok=await syncPush();syNow.textContent='Sync now';syMsg(ok?'✅ Synced just now':'❌ Sync failed — will retry automatically',ok)};
  const syOff=w.querySelector('#sy_off');if(syOff)syOff.onclick=()=>{if(!confirm('Disable cloud backup? On-device data stays.'))return;S.sync=null;save();closeSheets();openSettings()};
  w.querySelector('#sy_restore').onclick=async()=>{
    const code=w.querySelector('#sy_code').value.trim();
    if(!code.includes('.'))return syMsg('Paste the full sync code (looks like xxxx.yyyy)',false);
    if(!confirm('Restore from cloud? This replaces the data on THIS device with the cloud copy.'))return;
    try{const j=await syncPull(code);adoptRemote(j,code);closeSheets();render();toast('☁️ Data restored ✓')}
    catch(e){syMsg('Restore failed: '+e.message,false)}
  };
  w.querySelector('#st_test').onclick=async()=>{
    const o=w.querySelector('#st_testout');o.textContent='testing…';
    const bak={...S.ai};
    S.ai={key:w.querySelector('#st_key').value.trim(),endpoint:w.querySelector('#st_ep').value.trim(),model:w.querySelector('#st_model').value};
    try{await aiCall([{role:'user',content:'Reply with exactly: OK'}],{maxTokens:5});o.textContent='✅ working';o.style.color='var(--green)'}
    catch(e){o.textContent='❌ '+(e.message||'failed');o.style.color='var(--red)'}
    finally{S.ai=bak}
  };
  w.querySelector('#st_save').onclick=()=>{
    p.name=w.querySelector('#st_name').value.trim();p.sex=w.querySelector('#st_sex').value;
    p.age=clamp(+w.querySelector('#st_age').value||25,10,100);
    p.heightCm=clamp(+w.querySelector('#st_h').value||170,100,250);
    p.weightKg=clamp(+w.querySelector('#st_w').value||70,25,300);
    p.units=w.querySelector('#st_u').value;p.goal=w.querySelector('#st_goal').value;
    p.activity=+w.querySelector('#st_act').value;p.streakGoal=+w.querySelector('#st_streak').value;
    p.micros=w.querySelector('#st_micros').checked;
    S.reminders={enabled:w.querySelector('#st_rem').checked,time:w.querySelector('#st_remt').value||'20:00'};
    if(S.reminders.enabled&&typeof Notification!=='undefined'&&Notification.permission==='default')Notification.requestPermission();
    S.ai={key:w.querySelector('#st_key').value.trim(),endpoint:w.querySelector('#st_ep').value.trim(),model:w.querySelector('#st_model').value};
    save();closeSheets();render();toast('Saved ✓');
  };
}
function exportData(){
  const blob=new Blob([JSON.stringify(S,null,1)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`fitforge-backup-${todayKey()}.json`;a.click();
  toast('Backup downloaded');
}
function importData(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=()=>{const f=inp.files[0];if(!f)return;const r=new FileReader();
    r.onload=()=>{try{const j=JSON.parse(r.result);if(!j.profile||!j.days)throw 0;S=Object.assign(defaultState(),j);save();closeSheets();render();toast('Data restored ✓')}catch(e){toast('Invalid backup file')}};
    r.readAsText(f)};
  inp.click();
}
function resetAll(){if(confirm('Delete ALL FitForge data? This cannot be undone.')&&confirm('Really sure? Export a backup first!')){localStorage.removeItem(SKEY);location.reload()}}

/* ---------- ONBOARDING ---------- */
function openOnboarding(){
  let step=0;const data={name:'',sex:'m',age:25,heightCm:172,weightKg:70,goal:'aesthetic',activity:1.375,streakGoal:4};
  const w=openSheet(`<div class="shead"><h2 style="font-size:18px">Welcome to Fit<span class="acc">Forge</span> 🔥</h2>
    <div class="sm mut" style="margin-top:3px">30 seconds of setup, then we lift.</div>
    <div class="xs dim" style="margin-top:4px">Anonymous-ish usage analytics help improve the app — your logs stay on your device.</div></div>
   <div class="sbody">
    <div class="obstep on" data-s="0">
      <div class="field"><label>What should we call you?</label><input id="ob_name" placeholder="Your name"></div>
      <div class="grid2">
        <div class="field"><label>Sex</label><select id="ob_sex"><option value="m">Male</option><option value="f">Female</option></select></div>
        <div class="field"><label>Age</label><input type="number" id="ob_age" value="25"></div>
        <div class="field"><label>Height (cm)</label><input type="number" id="ob_h" value="172"></div>
        <div class="field"><label>Weight (kg)</label><input type="number" step="0.1" id="ob_w" value="70"></div>
      </div>
    </div>
    <div class="obstep" data-s="1">
      <div class="field"><label>Your goal</label><div class="segs" id="ob_goal">
        <button class="seg" data-v="cut">🔥 Fat loss<div class="d">Calorie deficit, keep muscle</div></button>
        <button class="seg on" data-v="aesthetic">✨ Aesthetic physique<div class="d">Recomp — lean & muscular</div></button>
        <button class="seg" data-v="bulk">💪 Muscle gain<div class="d">Calorie surplus, get strong</div></button>
        <button class="seg" data-v="maintain">⚖️ Maintain<div class="d">Stay fit and consistent</div></button>
      </div></div>
      <div class="field"><label>Current activity outside the gym</label><select id="ob_act">
        <option value="1.2">Sedentary (desk job)</option><option value="1.375" selected>Lightly active</option>
        <option value="1.55">Moderately active</option><option value="1.725">Very active</option></select></div>
    </div>
    <div class="obstep" data-s="2">
      <div class="field"><label>Weekly streak goal — train how many days a week?</label><div class="segs" id="ob_streak">
        ${[3,4,5,6].map(n=>`<button class="seg ${n===4?'on':''}" data-v="${n}">${n} days / week<div class="d">${n<=3?'Sustainable start':n===4?'The sweet spot ⭐':n===5?'Serious business':'Beast mode'}</div></button>`).join('')}
      </div></div>
      <div class="sm mut" style="line-height:1.5">Hit your goal each week → your character levels up 🐣→🦅→🐉. Miss a week? Shields 🛡️ protect your streak (earned every 2 good weeks).</div>
    </div>
    <div class="obstep" data-s="3">
      <div class="field"><label>Beyond the gym — what else are you building (or quitting)? Tap to select:</label>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px" id="ob_habits">
        ${PRESET_HABITS.map((p,i)=>`<button class="chip ${i<2?'on':''}" data-i="${i}">${p[0]} ${p[1]}</button>`).join('')}
      </div></div>
      <div class="sm mut" style="line-height:1.5">These shape your character's stats — 🧘 Mind, 🛡️ Willpower, 📚 Growth, ✨ Vitality — and count toward weekly level-ups. You can add, edit priorities, or remove any time in the Habits tab.</div>
    </div>
    <button class="btn full" style="margin-top:16px" id="ob_next">Continue →</button>
   </div>`);
  w.querySelector('.bg').onclick=null; // force completion
  w.querySelectorAll('#ob_goal .seg').forEach(b=>b.onclick=()=>{w.querySelectorAll('#ob_goal .seg').forEach(x=>x.classList.remove('on'));b.classList.add('on');data.goal=b.dataset.v});
  w.querySelectorAll('#ob_streak .seg').forEach(b=>b.onclick=()=>{w.querySelectorAll('#ob_streak .seg').forEach(x=>x.classList.remove('on'));b.classList.add('on');data.streakGoal=+b.dataset.v});
  w.querySelectorAll('#ob_habits .chip').forEach(c=>c.onclick=()=>c.classList.toggle('on'));
  w.querySelector('#ob_next').onclick=()=>{
    if(step===0){data.name=w.querySelector('#ob_name').value.trim();data.sex=w.querySelector('#ob_sex').value;
      data.age=clamp(+w.querySelector('#ob_age').value||25,10,100);data.heightCm=clamp(+w.querySelector('#ob_h').value||172,100,250);
      data.weightKg=clamp(+w.querySelector('#ob_w').value||70,25,300)}
    if(step===1)data.activity=+w.querySelector('#ob_act').value;
    step++;
    if(step>3){
      Object.assign(S.profile,data);S.onboarded=true;S.weights.push({d:todayKey(),kg:data.weightKg});
      w.querySelectorAll('#ob_habits .chip.on').forEach(c=>S.habits.push(presetToHabit(PRESET_HABITS[+c.dataset.i])));
      save();closeSheets();render();
      track('onboarding_completed',{habits:activeHabits().length,goal:data.goal,streak_goal:data.streakGoal});phIdentify();
      toast(`Let's forge, ${data.name||'champ'} 🔥`);return}
    track('onboarding_step',{step});
    w.querySelectorAll('.obstep').forEach(el=>el.classList.toggle('on',+el.dataset.s===step));
    w.querySelector('#ob_next').textContent=step===3?'Start forging 🔥':'Continue →';
  };
}

/* ---------- PWA manifest (runtime blob) ---------- */
try{
  const man={name:'FitForge',short_name:'FitForge',display:'standalone',start_url:'.',background_color:'#0f1117',theme_color:'#0f1117',
    icons:[{src:document.querySelector('link[rel=apple-touch-icon]').href,sizes:'180x180',type:'image/png'}]};
  const l=document.createElement('link');l.rel='manifest';l.href=URL.createObjectURL(new Blob([JSON.stringify(man)],{type:'application/json'}));
  document.head.appendChild(l);
}catch(e){}

/* ---------- boot ---------- */
load();
initAnalytics();
loadExDB();
setView('home');
if(!S.onboarded){openOnboarding();track('onboarding_started')}
bootSyncPull();
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden')syncPush()});

/* daily reminder (fires while the app/tab is open) */
setInterval(()=>{try{
  if(!S.reminders||!S.reminders.enabled)return;
  if(typeof Notification==='undefined'||Notification.permission!=='granted')return;
  const now=new Date(),hm=pad(now.getHours())+':'+pad(now.getMinutes());
  if(hm!==S.reminders.time)return;
  const flag='ff_rem_'+todayKey();if(localStorage.getItem(flag))return;
  localStorage.setItem(flag,'1');
  const t=todayKey(),si=streakInfo();
  const pending=activeHabits().filter(h=>h.type!=='quit'&&!habitDone(h,t)).length;
  const parts=[];
  if(!isActiveDay(t))parts.push(`No training yet (${si.thisWeek}/${si.goal} this week)`);
  if(pending)parts.push(`${pending} habit${pending>1?'s':''} unchecked`);
  new Notification('FitForge 🔥',{body:parts.length?parts.join(' · ')+' — small actions, big streaks.':'All done today — legend behaviour ✓'});
}catch(e){}},30000);
</script>
